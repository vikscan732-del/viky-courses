<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>course49 Admin</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
color:#E50914;
margin-bottom:25px;
}

form{
background:#1b1b1b;
padding:20px;
border-radius:15px;
max-width:500px;
margin:auto;
}

input,textarea,select{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#E50914;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#ff2a2a;
}

</style>

</head>

<body>

<h1>course49 Admin Panel</h1>

<form>

<input
type="text"
placeholder="Course Title">

<input
type="number"
placeholder="Price">

<input
type="text"
placeholder="Thumbnail Image URL">

<select>

<option>Programming</option>

<option>Android</option>

<option>AI</option>

<option>Business</option>

<option>Design</option>

</select>

<textarea
rows="5"
placeholder="Course Description"></textarea>

<button type="submit">

Add Course

</button>

</form>

</body>
</html>

<script type="module" src="admin.js"></script>

</body>
</html>
